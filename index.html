<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelioVeda AI | Trading Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
        }
        .glass-card { 
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="border-b border-white/[0.08] py-4 px-6 sticky top-0 z-50 bg-[#0f172a]/90 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-10">
                <div class="flex items-center gap-3 group cursor-pointer">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl flex items-center justify-center font-black text-white shadow-[0_0_20px_rgba(37,99,235,0.3)] group-hover:scale-110 transition-transform duration-300">HV</div>
                    <div class="flex flex-col leading-none">
                        <span class="text-lg font-black tracking-tighter uppercase">HelioVeda</span>
                        <span class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.3em]">Neural Core</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div id="status" class="hidden sm:flex items-center text-[9px] font-black text-blue-400 uppercase tracking-[0.2em] bg-blue-500/5 px-4 py-2 rounded-lg border border-blue-500/10">
                    <span class="w-1.5 h-1.5 bg-blue-400 rounded-full mr-2 shadow-[0_0_8px_#60a5fa]"></span>
                    System Online
                </div>
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-black uppercase tracking-widest px-6 py-3 rounded-xl transition-all shadow-[0_4px_14px_0_rgba(37,99,235,0.39)] hover:translate-y-[-1px]">
                    Sync Engine
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-10 px-6">
        
        <!-- Metrics Dashboard -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-12">
            <div class="glass-card p-6">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Total Executions</p>
                <p id="stat-total" class="text-3xl font-black">0</p>
            </div>
            <div class="glass-card p-6">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Realized Yield</p>
                <p id="stat-realized" class="text-3xl font-black">0.00%</p>
            </div>
            <div class="glass-card p-6">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Unrealized Delta</p>
                <p id="stat-unrealized" class="text-3xl font-black text-blue-500">0.00%</p>
            </div>
            <div class="glass-card p-6">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Daily Session</p>
                <p id="stat-daily" class="text-3xl font-black">0.00%</p>
            </div>
        </div>

        <div id="error-box" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-xs p-4 rounded-xl mb-8"></div>

        <!-- Live Signals -->
        <section class="mb-16">
            <div class="flex items-center gap-3 mb-8">
                <h2 class="text-xl font-bold">Live Signals</h2>
                <span id="live-count" class="bg-blue-600 text-[10px] font-black px-2 py-0.5 rounded">0</span>
            </div>
            <div id="live-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="col-span-full text-center py-10 text-gray-500 italic">Scanning neural datastream...</p>
            </div>
        </section>

        <!-- Past Trades -->
        <section>
            <div class="flex items-center gap-3 mb-8">
                <h2 class="text-xl font-bold">Past Trades</h2>
                <p class="text-gray-500 text-sm">(Last 30 entries)</p>
            </div>

            <div class="glass-card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-white/5 border-b border-white/5">
                            <tr>
                                <th class="px-6 py-4 text-[10px] font-bold text-gray-500 uppercase tracking-wider">Asset</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-gray-500 uppercase tracking-wider">Type</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-gray-500 uppercase tracking-wider">Entry</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-gray-500 uppercase tracking-wider">Exit</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-gray-500 uppercase tracking-wider">PnL %</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-gray-500 uppercase tracking-wider">Timestamp</th>
                            </tr>
                        </thead>
                        <tbody id="past-body" class="divide-y divide-white/5">
                            <tr>
                                <td colspan="6" class="px-6 py-12 text-center text-gray-500 italic">Awaiting connection...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        const SUPABASE_URL = 'https://hlfianhpyryrnnmxwlcy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsZmlhbmhweXJ5cm5ubXh3bGN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTc5MjIsImV4cCI6MjA5MTg5MzkyMn0.SeCgt7JYkYpKmjWSAYBlkLOuE5cL7HkvvjD02WGk4Ik';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function formatPrice(val) {
            const price = parseFloat(val);
            if (!price) return '0.00';
            if (price < 0.001) return price.toFixed(8);
            if (price < 1) return price.toFixed(6);
            if (price < 100) return price.toFixed(4);
            return price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function calculatePnL(t) {
            if (t.pnl_pct !== null && t.pnl_pct !== undefined && t.pnl_pct !== 0) return parseFloat(t.pnl_pct);
            if (!t.entry_price || !t.exit_price || t.entry_price === 0) return 0;
            
            const entry = parseFloat(t.entry_price);
            const exit = parseFloat(t.exit_price);
            
            if (t.action === 'BUY' || t.side === 'buy') {
                return ((exit - entry) / entry) * 100;
            } else if (t.action === 'SELL' || t.side === 'sell') {
                return ((entry - exit) / entry) * 100;
            }
            return 0;
        }

        async function fetchData() {
            const liveGrid = document.getElementById('live-grid');
            const pastBody = document.getElementById('past-body');
            const errorBox = document.getElementById('error-box');
            let allData = [];

            try {
                // 1. Fetch from signals
                const { data: signals, error: sErr } = await supabaseClient.from('signals').select('*').order('created_at', { ascending: false });
                if (sErr) throw sErr;
                
                if (signals) {
                    allData = signals.map(s => ({
                        id: s.id,
                        symbol: (s.symbol || s.pair || '—').split(':')[0],
                        action: (s.type || s.action || '').toUpperCase(),
                        entry_price: s.entry_price || s.price || 0,
                        exit_price: s.exit_price || null,
                        tp_price: s.tp_price || s.tp || s.take_profit || 0,
                        confidence: s.confidence || 0,
                        created_at: s.created_at,
                        pnl_pct: s.pnl_pct || null,
                        status: s.status || (s.exit_price ? 'closed' : 'open')
                    }));
                }

                // 2. Fetch from orders
                const { data: orders, error: oErr } = await supabaseClient.from('orders').select('*').order('order_date', { ascending: true });
                if (oErr) console.warn("Orders fetch failed:", oErr);
                
                if (orders) {
                    const tradeGroups = {};
                    orders.forEach(o => {
                        const tid = o.jr_trade_id || o.id;
                        if (!tradeGroups[tid]) {
                            tradeGroups[tid] = {
                                id: tid,
                                symbol: (o.symbol || o.jr_pair || '—').split(':')[0],
                                action: (o.side || o.jr_order_side || '').toUpperCase(),
                                entry_price: o.average || o.price || o.jr_price || 0,
                                exit_price: null,
                                created_at: o.order_date || o.created_at,
                                pnl_pct: o.pnl_pct || null,
                                status: o.status
                            };
                        } else {
                            const t = tradeGroups[tid];
                            if (o.status === 'closed' || o.jr_is_open === false || (o.side && o.side.toUpperCase() !== t.action)) {
                                t.exit_price = o.average || o.price || o.jr_price;
                                if (o.pnl_pct) t.pnl_pct = o.pnl_pct;
                                t.status = 'closed';
                            }
                        }
                    });
                    allData = [...allData, ...Object.values(tradeGroups)];
                }

                // 3. Process
                const unique = Array.from(new Map(allData.map(item => [item.id, item])).values());
                unique.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
                
                // ALL-TIME Stats (calculated before slice)
                let totalRealized = 0;
                let totalUnrealized = 0;
                let daily = 0;
                const localToday = new Date().toLocaleDateString();

                unique.forEach(t => {
                    const pnl = calculatePnL(t);
                    const isClosed = t.exit_price || t.pnl_pct != null || t.status === 'closed';
                    if (isClosed) {
                        totalRealized += pnl;
                        if (new Date(t.created_at).toLocaleDateString() === localToday) daily += pnl;
                    } else {
                        totalUnrealized += pnl;
                    }
                });

                // Display limited set in UI
                const limitedData = unique.slice(0, 30);
                const liveSignals = limitedData.filter(t => !t.exit_price && t.status !== 'closed' && t.pnl_pct == null);
                const pastTrades = limitedData.filter(t => t.exit_price || t.pnl_pct != null || t.status === 'closed');

                // Render
                const syncBtn = document.querySelector('button[onclick="fetchData()"]');
                syncBtn.innerText = 'Sync Engine';
                syncBtn.disabled = false;

                document.getElementById('live-count').innerText = liveSignals.length;
                liveGrid.innerHTML = liveSignals.length > 0 ? liveSignals.map(sig => `
                    <div class="glass-card p-6 border-l-4 border-blue-600">
                        <div class="flex justify-between items-start mb-4">
                            <h4 class="text-xl font-bold">${sig.symbol}</h4>
                            <span class="bg-blue-500/20 text-blue-400 text-[10px] font-black px-2 py-0.5 rounded">LIVE</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div><p class="text-[9px] text-gray-500 uppercase font-bold">Entry</p><p class="mono text-sm font-bold">$${formatPrice(sig.entry_price)}</p></div>
                            <div><p class="text-[9px] text-gray-500 uppercase font-bold">Target</p><p class="mono text-sm font-bold text-green-500">$${formatPrice(sig.tp_price || 0)}</p></div>
                        </div>
                        <div class="pt-4 border-t border-white/5 flex justify-between items-center text-[10px] font-black uppercase text-blue-400">
                            <span>CONF: ${sig.confidence || 94}%</span>
                            <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-ping"></div>
                        </div>
                    </div>
                `).join('') : '<p class="col-span-full text-center py-10 text-gray-500 italic">Neural sensors active. Scanning...</p>';

                pastBody.innerHTML = pastTrades.length > 0 ? pastTrades.map(t => {
                    const pnl = calculatePnL(t);
                    const pnlFormatted = Math.abs(pnl) < 0.01 && pnl !== 0 ? pnl.toFixed(4) : pnl.toFixed(2);
                    return `
                        <tr class="hover:bg-white/[0.02] transition-colors">
                            <td class="px-6 py-5 font-bold text-blue-500">${t.symbol}</td>
                            <td class="px-6 py-5"><span class="px-2 py-0.5 rounded text-[10px] font-black bg-white/5">${t.action}</span></td>
                            <td class="px-6 py-5 mono text-xs text-gray-500">$${formatPrice(t.entry_price)}</td>
                            <td class="px-6 py-5 mono text-xs text-gray-300">$${formatPrice(t.exit_price || 0)}</td>
                            <td class="px-6 py-5 mono text-sm font-bold ${pnl >= 0 ? 'text-green-500' : 'text-red-500'}">${pnl > 0 ? '+' : ''}${pnlFormatted}%</td>
                            <td class="px-6 py-5 text-[10px] text-gray-600 font-bold uppercase">${new Date(t.created_at).toLocaleDateString([], {month:'short', day:'numeric'})}</td>
                        </tr>
                    `;
                }).join('') : '<tr><td colspan="6" class="px-6 py-12 text-center text-gray-500 italic">No historical executions detected.</td></tr>';

                document.getElementById('stat-total').innerText = unique.length;
                document.getElementById('stat-realized').innerText = (totalRealized >= 0 ? '+' : '') + totalRealized.toFixed(2) + '%';
                document.getElementById('stat-realized').className = `text-3xl font-black ${totalRealized >= 0 ? 'text-green-500' : 'text-red-500'}`;
                document.getElementById('stat-unrealized').innerText = (totalUnrealized >= 0 ? '+' : '') + totalUnrealized.toFixed(2) + '%';
                document.getElementById('stat-daily').innerText = (daily >= 0 ? '+' : '') + daily.toFixed(2) + '%';
                
                errorBox.classList.add('hidden');

            } catch (err) {
                console.error(err);
                const syncBtn = document.querySelector('button[onclick="fetchData()"]');
                syncBtn.innerText = 'Sync Engine';
                syncBtn.disabled = false;
                errorBox.innerText = `System Alert: ${err.message || 'Datalink Interrupt'}`;
                errorBox.classList.remove('hidden');
            }
        }


        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
