<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelioVeda AI | Trading Systems</title>
    <!-- 11. Keep Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. Futuristic Design keeping dark theme and fonts */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
            /* 10. Smooth background transitions */
            transition: background-color 0.3s ease;
        }
        .glass-card { 
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            /* 10. Smooth animations */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 6. Loading spinner animation */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #3b82f6; /* blue-500 */
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="border-b border-white/[0.08] py-4 px-6 sticky top-0 z-50 bg-[#0f172a]/90 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-10">
                <div class="flex items-center gap-3 group cursor-pointer">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl flex items-center justify-center font-black text-white shadow-[0_0_20px_rgba(37,99,235,0.3)] group-hover:scale-110 transition-transform duration-300">HV</div>
                    <div class="flex flex-col leading-none">
                        <span class="text-lg font-black tracking-tighter uppercase">HelioVeda</span>
                        <span class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.3em]">Neural Core</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <!-- Status Indicator -->
                <div id="status" class="hidden sm:flex items-center text-[9px] font-black text-blue-400 uppercase tracking-[0.2em] bg-blue-500/5 px-4 py-2 rounded-lg border border-blue-500/10">
                    <span id="status-dot" class="w-1.5 h-1.5 bg-blue-400 rounded-full mr-2 shadow-[0_0_8px_#60a5fa] animate-pulse"></span>
                    <span id="status-text">System Online</span>
                </div>
                <!-- Manual Refresh Button -->
                <button onclick="loadSignals()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-black uppercase tracking-widest px-6 py-3 rounded-xl transition-all shadow-[0_4px_14px_0_rgba(37,99,235,0.39)] hover:translate-y-[-1px]">
                    Sync Engine
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-10 px-6">
        
        <!-- 7. Global Error Display: Shows when API fails -->
        <div id="global-error" class="hidden mb-8 p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm flex items-center gap-3">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span id="error-message">Connection to Neural Core interrupted. Retrying...</span>
        </div>

        <!-- 3. Statistics Cards (Responsive layout: grid-cols-2 mobile, grid-cols-4 desktop) -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-12">
            <div class="glass-card p-6">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Total Signals</p>
                <p id="stat-total" class="text-3xl font-black transition-all">0</p>
            </div>
            <div class="glass-card p-6">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">LONG Signals</p>
                <p id="stat-long" class="text-3xl font-black text-green-500 transition-all">0</p>
            </div>
            <div class="glass-card p-6">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">SHORT Signals</p>
                <p id="stat-short" class="text-3xl font-black text-red-500 transition-all">0</p>
            </div>
            <div class="glass-card p-6">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Last Update</p>
                <p id="stat-time" class="text-sm font-black text-blue-400 mt-2 mono transition-all">--:--:--</p>
            </div>
        </div>

        <section class="mb-16">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-3">
                    <h2 class="text-2xl font-bold">Live Trading Signals</h2>
                    <!-- 6. Initial / Refresh Loading Indicator near header -->
                    <div id="table-loader" class="loader hidden ml-2"></div>
                </div>
            </div>
            
            <div class="glass-card overflow-hidden">
                <!-- 8. Mobile responsive wrapper using overflow-x-auto -->
                <div class="overflow-x-auto">
                    <table class="w-full text-left" id="signalsTable">
                        <thead class="bg-white/5 border-b border-white/5">
                            <tr>
                                <th class="px-6 py-4 text-[10px] font-bold text-gray-500 uppercase tracking-wider">Symbol</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-gray-500 uppercase tracking-wider">Timeframe</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-gray-500 uppercase tracking-wider">Action</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-gray-500 uppercase tracking-wider">Confidence</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-gray-500 uppercase tracking-wider">Time</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-white/5 transition-all duration-500">
                            <!-- 6. Initial Loading State -->
                            <tr id="initial-loading">
                                <td colspan="5" class="px-6 py-12 text-center text-gray-500 italic">
                                    <div class="flex flex-col items-center justify-center gap-4">
                                        <div class="loader"></div>
                                        <span>Initializing Data Streams...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- 13. Complete Javascript logic optimized for GitHub Pages / static hosting -->
    <script>
        let isFirstLoad = true;

        async function loadSignals() {
            const tableLoader = document.getElementById('table-loader');
            const tbody = document.querySelector("#signalsTable tbody");
            const globalError = document.getElementById('global-error');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            // Show mini loader on manual or subsequent refreshes
            if (!isFirstLoad) {
                tableLoader.classList.remove('hidden');
            }

            try {
                // 15. Fetch data from Render endpoint. CORS headers must be configured on backend.
                const response = await fetch("https://jarvisai-nqpj.onrender.com/api/signals");
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const signals = await response.json();

                // 2. Sort signals: newest first based on created_at timestamp
                signals.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                // Clear errors on success and restore "Online" status
                globalError.classList.add('hidden');
                statusDot.className = "w-1.5 h-1.5 bg-blue-400 rounded-full mr-2 shadow-[0_0_8px_#60a5fa] animate-pulse";
                statusText.innerText = "System Online";
                statusText.className = "";

                // Calculate statistics
                let longCount = 0;
                let shortCount = 0;

                // Build Table Rows
                if (!signals || signals.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-12 text-center text-gray-500 italic">No active signals found.</td></tr>';
                } else {
                    const rowsHTML = signals.map(signal => {
                        const actionStr = (signal.action || '').toUpperCase();
                        
                        // 9. Color Coding: LONG/BUY = green, SHORT/SELL = red
                        let actionColor = 'text-gray-400 bg-gray-500/10';
                        if (actionStr === 'BUY' || actionStr === 'LONG') {
                            actionColor = 'text-green-500 bg-green-500/10';
                            longCount++;
                        } else if (actionStr === 'SELL' || actionStr === 'SHORT') {
                            actionColor = 'text-red-500 bg-red-500/10';
                            shortCount++;
                        }

                        // 4. Convert confidence to percentage nicely
                        let confRaw = parseFloat(signal.confidence);
                        let confPercent = isNaN(confRaw) ? '-' : (confRaw <= 1 ? (confRaw * 100).toFixed(0) : confRaw.toFixed(0)) + '%';

                        // 10. Smooth transitions for hover (hover:bg-white/[0.04])
                        return `
                            <tr class="hover:bg-white/[0.04] transition-colors duration-200">
                                <td class="px-6 py-5 font-bold text-white">${signal.symbol || '-'}</td>
                                <td class="px-6 py-5 mono text-xs text-gray-400">${signal.timeframe || '-'}</td>
                                <td class="px-6 py-5">
                                    <span class="px-2.5 py-1 rounded-md text-[10px] font-black tracking-widest ${actionColor}">
                                        ${signal.action || '-'}
                                    </span>
                                </td>
                                <td class="px-6 py-5 mono text-sm font-bold text-gray-300">
                                    <div class="flex items-center gap-2">
                                        <div class="w-16 h-1.5 bg-gray-700 rounded-full overflow-hidden">
                                            <div class="h-full bg-blue-500 rounded-full" style="width: ${confPercent === '-' ? '0' : confPercent}"></div>
                                        </div>
                                        ${confPercent}
                                    </div>
                                </td>
                                <td class="px-6 py-5">
                                    <span class="text-[10px] text-gray-500 mono uppercase">${new Date(signal.created_at).toLocaleString()}</span>
                                </td>
                            </tr>
                        `;
                    }).join("");
                    
                    tbody.innerHTML = rowsHTML;
                }

                // 3. Update Stats Dashboard
                document.getElementById('stat-total').innerText = signals.length;
                document.getElementById('stat-long').innerText = longCount;
                document.getElementById('stat-short').innerText = shortCount;
                document.getElementById('stat-time').innerText = new Date().toLocaleTimeString();

            } catch (err) {
                console.error("Signal fetch error:", err);
                
                // 7. Show friendly error states
                document.getElementById('error-message').innerText = "Unable to connect to the signal API. Retrying in background...";
                globalError.classList.remove('hidden');
                
                // Update nav status to offline
                statusDot.className = "w-1.5 h-1.5 bg-red-500 rounded-full mr-2 shadow-[0_0_8px_#ef4444]";
                statusText.innerText = "System Offline";
                statusText.className = "text-red-400";

                // If it's the very first load and it fails, show an error row in the table
                if (isFirstLoad) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="px-6 py-12 text-center text-red-400 italic">
                                Failed to fetch live data. Please check connection.
                            </td>
                        </tr>
                    `;
                }
            } finally {
                // 6. Hide table loader after fetch finishes
                tableLoader.classList.add('hidden');
                isFirstLoad = false;
            }
        }

        // Initialize on load
        loadSignals();
        
        // 5. Refresh data automatically every 5 seconds
        setInterval(loadSignals, 5000);
    </script>
</body>
</html>
